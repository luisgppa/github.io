      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;

    .links a:hover {
      color: var(--oxide);

      padding: 24px 40px;
      border-top: 0.5px solid var(--border);

      font-size: 14px;
      color: var(--ink-2);
    }

      .code { font-size: 72px; }
